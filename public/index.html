<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MimiFlix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <a class="brand" href="#/">MimiFlix</a>

      <nav class="topbar-nav" aria-label="Navegação principal">
        <a class="nav-link active" href="#/" data-route="/">Início</a>
        <a class="nav-link" href="#/filmes" data-route="/filmes">Filmes</a>
        <a class="nav-link" href="#/series" data-route="/series">Séries</a>
        <a class="nav-link" href="#/desporto" data-route="/desporto">Ao vivo</a>
        <a class="nav-link" href="#/favoritos" data-route="/favoritos">
          <svg viewBox="0 0 24 24" aria-hidden="true" width="14" height="14" style="vertical-align:-1px">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.27 2 8.5 2 5.41 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.08C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.41 22 8.5c0 3.77-3.4 6.86-8.55 11.53L12 21.35z"/>
          </svg>
          Favoritos
        </a>
        <a class="nav-link" href="#/watchlist" data-route="/watchlist">Watchlist</a>
        <a class="nav-link" href="#/historico" data-route="/historico">Histórico</a>
        <a class="nav-link" href="#/mood" data-route="/mood">Mood</a>
        <a class="nav-link" href="#/listas" data-route="/listas">Listas</a>
        <a class="nav-link" href="#/amigos" data-route="/amigos">Amigos</a>
        <a class="nav-link" href="#/estreias" data-route="/estreias">Estreias</a>
        <a class="nav-link" href="#/colecoes" data-route="/colecoes">Coleções</a>
        <a id="profileNavLink" class="nav-link hidden" href="#/perfil" data-route="/perfil">Perfil</a>
        <a class="nav-link" href="#/conquistas" data-route="/conquistas">Conquistas</a>
      </nav>

      <div class="topbar-right">
        <label class="search-box" aria-label="Pesquisar filmes e séries">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M10.5 3a7.5 7.5 0 1 0 4.73 13.32l4.22 4.23 1.41-1.41-4.23-4.22A7.5 7.5 0 0 0 10.5 3Zm0 2a5.5 5.5 0 1 1 0 11 5.5 5.5 0 0 1 0-11Z"/>
          </svg>
          <input id="searchInput" type="text" placeholder="Pesquisar filmes e séries...">
          <div id="searchSuggestions" class="search-suggestions hidden"></div>
        </label>
        <button id="searchBtn" class="search-submit-btn" type="button" aria-label="Pesquisar">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10.5 3a7.5 7.5 0 1 0 4.73 13.32l4.22 4.23 1.41-1.41-4.23-4.22A7.5 7.5 0 0 0 10.5 3Zm0 2a5.5 5.5 0 1 1 0 11 5.5 5.5 0 0 1 0-11Z"/></svg>
        </button>
        <div class="notifications-wrap">
          <button id="notificationsBtn" class="notifications-btn" type="button" aria-label="Notificações" title="Notificações">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 22a2.5 2.5 0 0 0 2.45-2h-4.9A2.5 2.5 0 0 0 12 22Zm7-6V11a7 7 0 1 0-14 0v5l-2 2v1h18v-1l-2-2Z"/></svg>
            <span id="notificationsBadge" class="notifications-badge hidden">0</span>
          </button>
          <div id="notificationsPanel" class="notifications-panel hidden" aria-hidden="true"></div>
        </div>
        <div class="topbar-lang">
          <button id="themeToggleBtn" class="theme-toggle-btn" type="button" title="Alterar tema" aria-label="Alterar tema">☾</button>
          <select id="languageSelect" class="lang-select" title="Idioma TMDB">
            <option value="pt-PT">PT</option>
            <option value="pt-BR">PT-BR</option>
            <option value="en-US">EN</option>
            <option value="es-ES">ES</option>
            <option value="fr-FR">FR</option>
            <option value="de-DE">DE</option>
            <option value="it-IT">IT</option>
            <option value="ja-JP">JA</option>
          </select>
          <button id="reloadBtn" class="reload-btn" type="button" title="Recarregar catálogo" aria-label="Recarregar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
              <path d="M21 3v5h-5"/>
              <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
              <path d="M8 16H3v5"/>
            </svg>
          </button>
        </div>

        <!-- User area -->
        <div id="userArea" class="user-area">
          <button id="loginBtn" class="login-btn" type="button">Entrar</button>
          <div id="userPill" class="user-pill hidden">
            <div id="userAvatar" class="user-avatar"></div>
            <span id="userEmail" class="user-email"></span>
            <button id="logoutBtn" class="logout-btn" type="button" title="Sair">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </header>

    <section id="hero" class="hero">
      <div id="heroBackdrop" class="hero-backdrop"></div>
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <span class="eyebrow">Destaque MimiFlix</span>
        <h1 id="heroTitle">A carregar...</h1>
        <div id="heroMeta" class="hero-meta"></div>
        <p id="heroOverview" class="hero-overview"></p>
        <div class="hero-actions">
          <button id="heroPlayBtn" class="primary-btn" type="button">▶ Ver agora</button>
          <button id="heroInfoBtn" class="secondary-btn" type="button">Mais info</button>
        </div>
      </div>
    </section>

    <main id="appContent" class="content"></main>

    <nav class="mobile-bottom-nav" aria-label="Navegação móvel">
      <a class="mobile-bottom-link nav-link active" href="#/" data-route="/">
        <span class="mobile-bottom-icon">⌂</span>
        <span>Início</span>
      </a>
      <a class="mobile-bottom-link nav-link" href="#/filmes" data-route="/filmes">
        <span class="mobile-bottom-icon">🎬</span>
        <span>Filmes</span>
      </a>
      <a class="mobile-bottom-link nav-link" href="#/series" data-route="/series">
        <span class="mobile-bottom-icon">📺</span>
        <span>Séries</span>
      </a>
      <a class="mobile-bottom-link nav-link" href="#/favoritos" data-route="/favoritos">
        <span class="mobile-bottom-icon">♥</span>
        <span>Favoritos</span>
      </a>
      <a class="mobile-bottom-link nav-link" href="#/colecoes" data-route="/colecoes">
        <span class="mobile-bottom-icon">☰</span>
        <span>Coleções</span>
      </a>
      <a class="mobile-bottom-link nav-link" href="#/desporto" data-route="/desporto">
        <span class="mobile-bottom-icon">🏟</span>
        <span>Ao vivo</span>
      </a>
    </nav>
  </div>

  <!-- Auth Modal -->
  <div id="authModal" class="modal hidden" aria-hidden="true">
    <div class="auth-card">
      <button id="authCloseBtn" class="close-btn" type="button" aria-label="Fechar">×</button>
      <div class="auth-logo">MimiFlix</div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Entrar</button>
        <button class="auth-tab" data-tab="register">Criar conta</button>
      </div>

      <form id="authForm" class="auth-form" novalidate>
        <div class="auth-field">
          <label for="authEmail">Email</label>
          <input id="authEmail" type="email" placeholder="o@teu.email" autocomplete="email" required>
        </div>
        <div class="auth-field">
          <label for="authPassword">Password</label>
          <input id="authPassword" type="password" placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <p id="authError" class="auth-error hidden"></p>
        <button id="authSubmit" class="accent-btn auth-submit" type="submit">Entrar</button>
      </form>
    </div>
  </div>

  <!-- Detail Modal -->
  <div id="detailModal" class="modal hidden" aria-hidden="true">
    <div class="modal-card detail-modal-card">
      <button id="detailCloseBtn" class="close-btn" type="button" aria-label="Fechar">×</button>
      <section class="detail-hero-shell">
        <div id="detailBackdrop" class="detail-backdrop"></div>
        <div class="detail-hero-inner">
          <div class="detail-poster-wrap">
            <img id="detailPoster" class="detail-poster" alt="">
          </div>
          <div class="detail-copy">
            <span class="eyebrow">Detalhes</span>
            <h2 id="detailTitle"></h2>
            <div id="detailMeta" class="detail-meta"></div>
            <p id="detailOverview" class="detail-overview"></p>
            <div class="detail-actions">
              <button id="detailPlayBtn" class="accent-btn" type="button">▶ Ver agora</button>
              <button id="detailTrailerBtn" class="secondary-btn hidden" type="button">🎬 Trailer</button>
              <button id="detailFavBtn" class="fav-modal-btn" type="button">♡ Favorito</button>
              <button id="detailWatchlistBtn" class="fav-modal-btn" type="button">＋ Watchlist</button>
              <button id="detailListBtn" class="fav-modal-btn" type="button">☰ Lista</button>
              <button id="detailCloseFooterBtn" class="secondary-btn" type="button">Fechar</button>
            </div>
          </div>
        </div>
      </section>
      <section class="detail-body-grid">
        <div class="detail-body-main">
          <div id="detailSeriesPanel" class="detail-series-panel"></div>
          <div id="detailPremium" class="detail-premium"></div>
          <div id="detailPersonalReview" class="detail-personal-review"></div>
          <div id="detailSimilar" class="detail-similar"></div>
        </div>
        <aside class="detail-body-sidebar">
          <div id="detailFacts" class="detail-facts"></div>
        </aside>
      </section>
      <div id="detailAvailability" class="detail-availability detail-availability--fullwidth"></div>
    </div>
  </div>

  <!-- Player Modal -->
  <div id="playerOverlay" class="modal hidden" aria-hidden="true">
    <div id="playerCard" class="player-card">
      <div class="player-header">
        <h2 id="playerTitle" class="player-title">Player</h2>
        <div class="player-header-actions">
          <button id="playerCloseBtn" class="secondary-btn" type="button">✕ Fechar</button>
        </div>
      </div>
      <div id="playerProviderTabs" class="player-provider-tabs hidden"></div>
      <div id="playerContext" class="player-context hidden"></div>
      <div id="playerFrameWrap" class="player-frame-wrap">
        <iframe id="playerFrame" src="" allowfullscreen></iframe>
        <div id="subtitleOverlay" class="subtitle-overlay hidden">
          <p id="subtitleText" class="subtitle-text"></p>
        </div>
      </div>
    </div>
  </div>

  <input id="languageInput" type="hidden" value="pt-PT">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="app.js"></script>
</body>
</html>
